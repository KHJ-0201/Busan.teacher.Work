or:pointer;font-weight:700;width:100%;font-size:14px;margin-top:10px}.btn-save:hover{background:#219653}.guide-text{font-size:11px;color:#94a3b8;margin-top:5px;display:block}.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center;margin-top:5px}.cal-header{font-size:9px;font-weight:700;color:#64748b;padding-bottom:3px;border-bottom:1px solid #cbd5e1}.cal-day{padding:2px 0;font-size:9px;border-radius:4px;border:1px solid #e2e8f0;background:#f1f5f9;color:#94a3b8;cursor:not-allowed;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:28px}.cal-day.active{background:#fff;color:#334155;border-color:#cbd5e1;cursor:pointer;font-weight:700;transition:.2s}.cal-day.active:hover{background:#e0f2fe;border-color:#7dd3fc}.cal-day.selected{background:#3498db;color:#fff;border-color:#3498db}.cal-status{font-size:9px;line-height:1;margin-top:1px}</style></head><body><div class="container"><div class="header"><h2 style="margin:0;color:#1e293b;font-size:22px">🤝 학생별 상담일지</h2><div class="header-btns"><a href="#" id="btn_nav_month" class="btn-nav">📊 단위개월 분석</a> <a href="#" id="btn_nav_main" class="btn-nav">◀ 메인으로</a></div></div><div class="log-layout"><div class="left-panel"><div class="student-list" id="studentList"><div style="padding:20px;text-align:center;color:#94a3b8;font-size:12px">데이터를 불러오는 중입니다...</div></div><div class="summary-panel" id="summaryPanel" style="display:none"><h3 style="margin-top:0;border-bottom:2px solid #f1f5f9;padding-bottom:10px;color:#0f172a;font-size:15px">📊 단위개월 상담일 중복 횟수</h3><div id="summaryCalendarArea" style="border:1px solid #e1e8ed;border-radius:8px;padding:10px;background:#f8fafc;margin-top:5px"></div></div></div><div class="right-panel"><div class="tab-menu" id="tabMenu"></div><div class="dashboard-panel" id="dashboardPanel" style="display:none"></div><div class="form-panel" id="formPanel" style="display:none"><h3 id="formTitle" style="margin-top:0;border-bottom:2px solid #f1f5f9;padding-bottom:10px;color:#0f172a">학생을 선택하세요</h3><div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:start"><div style="background:#f8fafc;padding:15px;border-radius:8px;border:1px solid #e1e8ed"><div class="form-group" style="margin-bottom:20px"><label>상담일자 <span style="color:#2980b9;font-weight:400;margin-left:5px">(달력을 눌러 여러 날짜 선택/해제 가능)</span></label><div id="calendarArea" style="border:1px solid #cbd5e1;border-radius:8px;padding:10px;background:#fff;margin-top:5px"></div></div><button id="btn_save_log" class="btn-save" style="margin-top:10px;height:50px;font-size:16px">💾 선택된 날짜 기록 저장</button><p style="color:#94a3b8;font-size:11px;text-align:center;margin-top:10px">※ 하단의 저장 버튼을 눌러야 최종 반영됩니다.</p></div><div id="dynamicFormsArea" style="display:flex;flex-direction:column;gap:15px;max-height:600px;overflow-y:auto;padding-right:5px"></div></div></div></div></div><div class="summary-panel" id="summaryPanel" style="display:none"><h3 style="margin-top:0;border-bottom:2px solid #f1f5f9;padding-bottom:10px;color:#0f172a;font-size:15px">📊 단위개월 상담일 중복 횟수</h3><div id="summaryCalendarArea" style="border:1px solid #e1e8ed;border-radius:8px;padding:10px;background:#f8fafc;margin-top:5px"></div></div></div><script src="상담일지조치.js?v=1"></script><script src="상담일지.js?v=1"></script></body></html>
