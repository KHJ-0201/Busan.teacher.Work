:14px;background:rgba(255,235,238,.9);color:#c0392b;border:1px solid #ffcdd2;border-radius:6px;cursor:pointer;z-index:10}.btn-reset-small:hover{background:#c0392b;color:#fff}.footer{margin-top:25px;font-size:12px;color:#7f8c8d;cursor:default;user-select:none}@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}.main-wrapper{display:flex;gap:30px;align-items:flex-start;justify-content:center;width:100%;max-width:1000px}.banner-container{display:flex;flex-direction:column;gap:15px;width:250px;flex-shrink:0;margin-top:25px}.banner-item{background:#fff;padding:20px;border-radius:12px;box-shadow:0 5px 15px rgba(0,0,0,.1);text-align:center;text-decoration:none;color:#2c3e50;font-weight:700;border:2px solid transparent;transition:.3s}.banner-item:hover{transform:translateY(-3px);border-color:#3498db;color:#3498db}.banner-desc{display:block;font-size:11px;font-weight:400;color:#7f8c8d;margin-top:5px}@media (max-width:768px){body{padding:10px}.banner-container{display:none}.selector-container{padding:25px 10px}h1{font-size:18px}.version-header h2{font-size:14px}.btn-add-version{padding:5px 8px;font-size:10px}.version-row{flex-wrap:wrap;justify-content:center}.version-input{min-width:100%;margin-bottom:5px}.class-btn{padding:12px 5px;font-size:14px}}</style></head><body><div class="main-wrapper"><div class="selector-container"><div class="header-area"><h1>관리 학급 선택</h1></div><div class="class-grid"><div id="save_section" style="display:none;grid-column:span 2"><button id="btn_save_db" class="class-btn btn-save-active">💾 분석 완료! DB에 최종 저장하기</button></div><button id="btnStandardsList" class="class-btn btn-standards">📊 등록된 훈련기준 전체 조회</button><div class="class-item"><button class="class-btn btn-main-nav" data-class="501반">501반</button><button class="btn-reset-small reset-tool" data-class="501반">🧹</button></div><div class="class-item"><button class="class-btn btn-main-nav" data-class="601반">601반</button><button class="btn-reset-small rese
