<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>평가계획서 및 엑셀 관리 | 자동차 교육과정 통합 시스템</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    
    <style>
    /* [DESIGN_FIXED] 교사님 원본 디자인 100% 유지 + 테두리 침범 방지 수리 */
    body { font-family: 'Malgun Gothic', sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; color: #333; }
    .container { max-width: 1400px; margin: 30px auto; background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); min-height: 90vh; }
    .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid #3498db; padding-bottom: 15px; margin-bottom: 20px; }
    .class-info-bar { background: #e3f2fd; padding: 12px; border-radius: 10px; margin-bottom: 20px; display: flex; align-items: center; gap: 15px; }
    .btn-home { padding: 6px 12px; cursor: pointer; border: 1px solid #3498db; border-radius: 6px; background: white; color: #3498db; font-weight: bold; text-decoration: none; font-size: 13px; }
    .current-badge { background: #2c3e50; color: white; padding: 4px 12px; border-radius: 15px; font-size: 13px; font-weight: bold; }
    .section-card { background: #fff; padding: 15px; border-radius: 10px; border: 1px solid #e1e4e8; margin-bottom: 20px; }
    .scroll-box { max-height: 700px; overflow-y: auto; border: 1px solid #dee2e6; border-radius: 8px; position: relative; }

    /* 📍 테이블 기초: 순정 규격 */
    .course-table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 12px; table-layout: fixed; border-left: 1px solid #3498db; border-top: 1px solid #3498db; background-color: white; }
    .course-table th { background: #f8f9fa; position: sticky; top: 0; z-index: 100; padding: 14px 10px; border-bottom: 1px solid #3498db; border-right: 1px solid #a2d2ff; font-weight: 800; }
    .summary-row td { background-color: #2c3e50 !important; color: #ffffff !important; font-weight: bold; position: sticky; top: 43px; z-index: 95; border-bottom: 3px solid #3498db; border-right: 1px solid #dee2e6; padding: 10px; }

    /* 📍 [정밀 수리] 칸(td) 설정: 글자가 선을 침범하지 못하게 padding(여백) 주입 */
    .course-table td { border-bottom: 1px solid #a2d2ff; border-right: 1px solid #a2d2ff; text-align: center; vertical-align: middle; background: white; line-height: 1.4; padding: 0; overflow: hidden; }

    /* 📍 [핵심 수리] 능력단위명 입력창: 좌우 여백을 주어 테두리와의 충돌을 원천 차단 */
    .course-table td input.c-unit-input { padding: 0 8px !important; box-sizing: border-box; width: 100%; height: 100%; min-height: 35px; border: none; background: transparent; }

    /* 📍 강조 칸: 순정 디자인 유지 */
    .subject-cell { background-color: #f0f7ff; font-weight: bold; color: #2c3e50; border-right: 3px solid #3498db !important; border-left: 3px solid #3498db !important; border-bottom: 1px solid #a2d2ff; padding: 5px !important; }
    .subject-total-cell { background-color: #fff9f0; font-weight: bold; color: #e67e22; border-left: 3px solid #e67e22 !important; border-right: 3px solid #e67e22 !important; border-bottom: 1px solid #a2d2ff; padding: 5px !important; }
    .top-border-thick td { border-top: 3px solid #3498db !important; }

    /* 📍 내부 박스 구조: 순정 유지 */
    .sub-item-container { display: flex; flex-direction: column; width: 100%; height: 100%; }
    .sub-item-row { display: flex; align-items: center; justify-content: center; border-bottom: 1px solid #eee; min-height: 35px; box-sizing: border-box; }
    .sub-item-row:last-child { border-bottom: none; }

    /* 📍 공통 입력창 설정 */
    .editable-input { width: 100%; height: 100%; border: none; text-align: center; font-size: 12px; font-family: inherit; transition: background 0.3s; padding: 0 5px; box-sizing: border-box; }
    
    /* 📍 나머지 UI 요소: 순정 유지 */
    .btn { padding: 9px 18px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; font-size: 12px; transition: 0.2s; }
    .btn-blue { background: #3498db; color: white; }
    .btn-green { background: #27ae60; color: white; }
    .btn-orange { background: #e67e22; color: white; }
    .unit-type-container { display: flex; gap: 4px; justify-content: center; margin-top: 5px; padding: 0 5px; }
    .type-toggle-btn { flex: 1; padding: 4px 0; font-size: 10px; font-weight: bold; border: 1px solid #ddd; background: #f9f9f9; color: #999; border-radius: 4px; cursor: pointer; transition: all 0.2s; }
    .type-toggle-btn.active-req { background: #ff4d4f; color: white; border-color: #cf1322; }
    .type-toggle-btn.active-opt { background: #ffa940; color: white; border-color: #d46b08; }
    @media (max-width: 768px) {
        /* 1. 기본 배경 및 컨테이너: index.html 스타일 적용 */
        body { padding: 10px; background-color: #f4f7f6; }
        .container { margin: 10px auto; padding: 15px; min-height: auto; width: 95%; border-radius: 10px; box-shadow: none; box-sizing: border-box; }

        /* 2. 헤더 및 학급 정보 바: 텍스트 압축 */
        .header { margin-bottom: 5px; border-bottom: 2px solid #3498db; flex-direction: column; align-items: center; }
        .header h1 { font-size: 13px; margin: 3px 0; text-align: center; }
        
        .class-info-bar { position: relative; flex-direction: row; justify-content: flex-start; gap: 8px; padding: 5px; margin-bottom: 5px; border-radius: 6px; }
        .class-info-bar div { font-size: 10px; white-space: nowrap; }
        .btn-home { padding: 4px 8px; font-size: 10px; }
        .current-badge { padding: 2px 8px; font-size: 10px; }

        /* 3. 섹션 카드 및 상단 버튼 뭉치: index.html 버튼 스타일 계승 */
        .section-card { padding: 8px !important; margin-bottom: 10px !important; min-height: auto !important; }
        .section-card h3 { font-size: 10px !important; margin-bottom: 8px !important; color: #555; }
        
        /* 버튼들을 2열 그리드로 정렬 */
        .section-card div[style*="display: flex"] { flex-direction: column !important; gap: 4px !important; }
        .section-card div[style*="display: flex"] div[style*="display: flex"] { 
            display: grid !important; 
            grid-template-columns: 1fr 1fr; 
            gap: 4px !important; 
            width: 100%; 
        }
        .btn { padding: 6px 2px !important; font-size: 9px !important; min-height: 30px !important; line-height: 1.2; width: 100%; margin: 0 !important; }

        /* 4. 테이블(표) 정밀 개조: index.html과 90% 동일하게 세팅 */
        .scroll-box { overflow-x: hidden; border: 1px solid #dee2e6; }
        .course-table { width: 100% !important; min-width: 100% !important; table-layout: fixed !important; font-size: 9px !important; }
        
        /* [중요] 열 너비 배분 (index.html 수치 계승) */
        .course-table th:nth-child(1), .course-table td:nth-child(1) { width: 30% !important; } /* 교과목 */
        .course-table th:nth-child(2), .course-table td:nth-child(2) { width: 55% !important; } /* 능력단위명 */
        .course-table th:nth-child(5), .course-table td:nth-child(5) { width: 15% !important; display: table-cell !important; } /* 총 시간 */
        
        /* [핵심] 불필요한 열 숨기기 (세부교과, 시간h, 삭제버튼 등 공간 확보를 위해 선택적 숨김) */
        .course-table th:nth-child(3), .course-table td:nth-child(3), /* 세부교과 */
        .course-table th:nth-child(4), .course-table td:nth-child(4), /* 시간(h) */
        .course-table th:nth-child(6), .course-table td:nth-child(6) { /* 관리(삭제) */
            display: none !important; 
            visibility: collapse !important; 
            width: 0 !important; 
        }

        .course-table th, .course-table td { padding: 4px 2px !important; height: auto !important; overflow: hidden; }

        /* 5. 내부 입력창 스타일: 작은 화면에 맞게 최적화 */
        .editable-input { font-size: 9px !important; padding: 2px !important; height: auto !important; }
        .c-subject-type, .c-eval-method { font-size: 8px !important; width: 95% !important; margin: 2px 0 !important; height: 22px !important; }
        
        /* 필수/선택 토글 버튼 축소 */
        .unit-type-container { gap: 2px; padding: 0; }
        .type-toggle-btn { font-size: 8px !important; padding: 2px 0 !important; height: 20px !important; }

        /* 6. 요약 줄(Summary) 정비 */
        .summary-row td:nth-child(3), .summary-row td:nth-child(4) { display: none !important; }
        .summary-row td { font-size: 9px !important; padding: 5px 2px !important; background-color: #2c3e50 !important; }

        /* 7. 세부 항목 컨테이너 숨김 (index.html 정책 계승) */
        .sub-item-container, .sub-item-row { display: none !important; height: 0 !important; }
    }
</style>
</head>
<body>

<div class="container">
    <div class="class-info-bar">
        <a href="index1.html" id="backLink" class="btn-home">◀ 관리 메인으로 이동</a>
        <div style="margin-left: auto;">
            <span>현재 학급: </span>
            <span id="currentClassDisplay" class="current-badge">로딩 중...</span>
        </div>
    </div>

    <div class="header">
        <h1>📋 평가계획서 및 엑셀 출력 센터</h1>
    </div>

    <div class="section-card">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
            <h3 style="margin:0;">📂 불러온 교과목 데이터 현황</h3>
            <div style="display: flex; gap: 8px;">
                <button class="btn btn-orange" onclick="downloadPreEvaluationPlan()">💾 사전평가 계획 다운</button>
                <button class="btn btn-green" onclick="downloadCourseTableExcel()">💾 교과목 편성내용 다운</button>
                <button class="btn btn-purple" onclick="downloadEvalMethodExcel()">💾 평가방법 및 내용 다운</button>
                <button class="btn btn-blue" onclick="saveAllDataWithAlert()">💾 변경사항 서버 저장</button>
            </div>
        </div>
        
        <div class="scroll-box">
            <table class="course-table">
                <thead>
                    <tr>
                        <th width="15%">교과목</th>
                        <th width="20%">능력단위명</th>
                        <th width="35%">세부교과</th>
                        <th width="10%">시간(h)</th>
                        <th width="10%">총 시간</th>
                        <th width="8%">관리</th>
                    </tr>
                </thead>
                <tbody id="courseTableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script src="평가계획서.js"></script>
</body>
</html>
