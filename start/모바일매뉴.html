<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>모바일 전용 메뉴</title><style>body{font-family:'Malgun Gothic',sans-serif;background:#f4f7f6;margin:0;padding:20px;text-align:center}.menu-container{background:#fff;border-radius:12px;padding:30px 20px;box-shadow:0 5px 15px rgba(0,0,0,.1);margin-top:20px}.class-title{font-size:22px;font-weight:700;color:#2c3e50;margin-bottom:20px;border-bottom:2px solid #3498db;padding-bottom:10px}.btn-menu{display:block;width:100%;padding:20px;margin-bottom:15px;color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:700;cursor:pointer;box-sizing:border-box;box-shadow:0 4px 6px rgba(0,0,0,.1)}.btn-menu:active{transform:translateY(2px);box-shadow:none}.btn-makeup{background:#8e44ad}.btn-photo{background:#e67e22}.btn-main{background:#27ae60}.btn-back{background:#6c1928}</style></head><body><div class="menu-container"><div class="class-title" id="displayClassName">학급 로드 중...</div><button class="btn-menu btn-makeup" onclick="goToMakeup()">📸 보강수업 사진/싸인 바로가기</button> <button class="btn-menu btn-photo" onclick="goToPhoto()">📷 평가 근거사진 등록 바로가기</button> <button class="btn-menu btn-main" onclick="goToIndex()">🏠 메인 (출석부/시간표) 이동</button> <button class="btn-menu btn-back" onclick='location.href="select_class.html"'>◀ 반 선택 다시하기</button></div><script>let urlParams=new URLSearchParams(window.location.search),currentClass=urlParams.get("class")||"알 수 없음";function goToMakeup(){window.location.href=`보강수업.html?class=${encodeURIComponent(currentClass)}&sort=historyTime`}function goToPhoto(){window.location.href=`../평가지/평가지.html?class=${encodeURIComponent(currentClass)}&target=photo`}function goToIndex(){window.location.href="index1.html?class="+currentClass}document.getElementById("displayClassName").innerText="📱 "+currentClass+" 모바일 메뉴"</script></body></html>
