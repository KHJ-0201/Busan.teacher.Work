<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>모바일 전용 메뉴</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background: #f4f7f6; margin: 0; padding: 20px; text-align: center; }
        .menu-container { background: white; border-radius: 12px; padding: 30px 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); margin-top: 20px; }
        .class-title { font-size: 22px; font-weight: bold; color: #2c3e50; margin-bottom: 20px; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        .btn-menu {
            display: block; width: 100%; padding: 20px; margin-bottom: 15px; color: white; border: none;
            border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; box-sizing: border-box;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .btn-menu:active { transform: translateY(2px); box-shadow: none; }
        .btn-makeup { background: #8e44ad; }
        .btn-photo { background: #e67e22; }
        .btn-main { background: #27ae60; }
        .btn-back { background: #6c1928; }
    </style>
</head>
<body>

    <div class="menu-container">
        <div class="class-title" id="displayClassName">학급 로드 중...</div>

        <button class="btn-menu btn-makeup" onclick="goToMakeup()">📸 보강수업 사진/싸인 바로가기</button>
        <button class="btn-menu btn-photo" onclick="goToPhoto()">📷 평가 근거사진 등록 바로가기</button>
        <button class="btn-menu btn-main" onclick="goToIndex()">🏠 메인 (출석부/시간표) 이동</button>
        <button class="btn-menu btn-back" onclick="location.href='select_class.html'">◀ 반 선택 다시하기</button>
    </div>

    <script src="../common-class-db.js"></script>
    <script>
        initClassContext();
        document.getElementById('displayClassName').innerText = '📱 ' + formatClassHudText() + ' 모바일 메뉴';

        function goToMakeup() {
            window.location.href = classNavHref('보강수업.html', 'sort=historyTime');
        }
        function goToPhoto() {
            window.location.href = classNavHref('../평가지/평가지.html', 'target=photo');
        }
        function goToIndex() {
            window.location.href = classNavHref('index1.html');
        }
    </script>
</body>
</html>
