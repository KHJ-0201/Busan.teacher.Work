<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>정비 관리 | 자동차 교육과정 통합 시스템</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    
    <style>
        /* [DESIGN_FIXED] 기존 디자인 규격 100% 유지 */
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1400px; margin: 30px auto; background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); min-height: 90vh; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid #3498db; padding-bottom: 15px; margin-bottom: 20px; }
        .class-info-bar { background: #e3f2fd; padding: 12px; border-radius: 10px; margin-bottom: 20px; display: flex; align-items: center; gap: 15px; }
        .btn-home { padding: 6px 12px; cursor: pointer; border: 1px solid #3498db; border-radius: 6px; background: white; color: #3498db; font-weight: bold; text-decoration: none; font-size: 13px; }
        .current-badge { background: #2c3e50; color: white; padding: 4px 12px; border-radius: 15px; font-size: 13px; font-weight: bold; }
        .section-card { background: #fff; padding: 15px; border-radius: 10px; border: 1px solid #e1e4e8; margin-bottom: 20px; }
        .top-action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .info-grid { display: grid; grid-template-columns: 2fr 1.5fr 1fr 1fr; gap: 15px; margin-top: 10px; }
        .info-item label { display: block; font-size: 12px; color: #666; margin-bottom: 5px; font-weight: bold; }
        .info-item input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; font-size: 13px; }
        #trainingPeriod { background: #fff; color: #e67e22; font-weight: bold; border: 2px solid #e67e22; }
        .scroll-box { max-height: 600px; overflow-y: auto; border: 1px solid #dee2e6; border-radius: 8px; position: relative; }
        .course-table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 12px; table-layout: fixed; border-left: 1px solid #dee2e6; border-top: 1px solid #dee2e6; background-color: white; }
        .course-table th { background: #f8f9fa; position: sticky; top: 0; z-index: 30; padding: 14px 10px; border-bottom: 1px solid #dee2e6; border-right: 1px solid #dee2e6; font-weight: 800; }
        .summary-row td { background-color: #2c3e50 !important; color: #ffffff !important; font-weight: bold; position: sticky; top: 45px; z-index: 25; border-bottom: 3px solid #3498db; border-right: 1px solid #dee2e6; padding: 10px; }
        .course-table td { border-bottom: 1px solid #a2d2ff; border-right: 1px solid #a2d2ff; text-align: center; vertical-align: middle; background: white; line-height: 1.4; padding: 0; }
        .subject-cell { background-color: #f0f7ff; font-weight: bold; color: #2c3e50; border-right: 3px solid #3498db !important; border-left: 3px solid #3498db !important; border-bottom: 1px solid #dee2e6; padding: 5px !important; }
        .subject-total-cell { background-color: #fff9f0; font-weight: bold; color: #e67e22; border-left: 3px solid #e67e22 !important; padding: 5px !important; }
        .top-border-thick { border-top: 3px solid #3498db !important; }
        .sub-item-container { display: flex; flex-direction: column; width: 100%; height: 100%; }
        .top-border-thick td { border-top: 3px solid #3498db !important; }
        .sub-item-row { display: flex; align-items: center; justify-content: center; border-bottom: 1px solid #eee; min-height: 35px; box-sizing: border-box; }
        .sub-item-row:last-child { border-bottom: none; }
        .editable-input { width: 100%; height: 100%; border: none; text-align: center; font-size: 12px; font-family: inherit; transition: background 0.3s; }
        .editable-input:focus { background: #fffde7; outline: none; }
        .text-left { text-align: left; padding-left: 10px; }
        .btn { padding: 9px 18px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; font-size: 12px; transition: 0.2s; }
        .btn-blue { background: #3498db; color: white; }
        .btn-green { background: #27ae60; color: white; }
        .btn-orange { background: #e67e22; color: white; }
        .btn-red { background: #e74c3c; color: white; }
        .upload-action-bar { display: flex; align-items: center; gap: 10px; background: #fffef0; padding: 10px; border: 1px dashed #e67e22; border-radius: 8px; margin-top: 5px; }

        .file-upload-wrapper { position: relative; display: inline-block; width: 100%; }
        .file-upload-label { display: block; background: #3498db; color: white; padding: 12px; text-align: center; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; border: 2px solid #2980b9; }
        .file-upload-label:hover { background: #2980b9; box-shadow: 0 4px 10px rgba(0,0,0,0.15); }
        #timetableFile { position: absolute; left: 0; top: 0; opacity: 0; width: 100%; height: 100%; cursor: pointer; }

        #connectionStatus { font-size: 12px; font-weight: bold; padding: 5px 10px; border-radius: 5px; }
        .status-online { color: #27ae60; background: #e8f5e9; }
        .status-offline { color: #e74c3c; background: #fdeaea; }
        .btn-purple { background: #8e44ad; color: white; } /* 단위개월 출석률 버튼용 */
        /* ============================================================
           [MOBILE_STYLING] 기존 PC 디자인을 보존하며 모바일 가변 화면 추가
           작동 원리: 화면 너비가 768px 이하일 때만 기존 설정을 보조함
           ============================================================ */
@media (max-width: 768px) {
    body { padding: 10px; }
    .container { margin: 10px auto; padding: 15px; min-height: auto; width: 95%; }
    .header { margin-bottom: 5px; border-bottom: 2px solid #3498db; }
    .header h1 { font-size: 13px; margin: 3px 0; text-align: center; } /* 타이틀만 중앙 배치 */
    #connectionStatus { position: absolute; top: 12px; right: 10px; font-size: 8px; padding: 1px 4px; } /* 서버 정보를 상단 바로 이동 배치 */
    .class-info-bar { position: relative; flex-direction: row; justify-content: flex-start; gap: 8px; padding: 5px; margin-bottom: 5px; } /* 한 줄 레이아웃 강제 */
    .class-info-bar div { font-size: 10px; white-space: nowrap; } /* 글자 줄바꿈 방지 및 크기 축소 */
    .top-action-grid { grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
    .section-card { padding: 8px !important; margin-bottom: 0 !important; min-height: auto !important; }
    .section-card h4 { font-size: 10px !important; margin-top: 0 !important; margin-bottom: 4px !important; color: #555; }
    .section-card .btn { padding: 4px 2px !important; font-size: 9px !important; min-height: 28px !important; line-height: 1.2; margin-bottom: 2px !important; width: 100%; }
    .file-upload-label { padding: 4px 2px !important; font-size: 10px !important; min-height: 28px !important; display: flex; align-items: center; justify-content: center; margin-bottom: 3px !important; }
    #downloadBtn { display: none !important; }
    #fileStatusBox { display: block !important; }
    .upload-action-bar { padding: 3px !important; gap: 1px !important; flex-direction: column; border: 1px dashed #ccc; }
    .upload-action-bar span { font-size: 9px !important; }
    .upload-action-bar .btn { padding: 2px !important; min-height: 20px !important; font-size: 8px !important; margin-bottom: 1px !important; }
    .section-card div[style*="flex-direction: column"] { gap: 2px !important; }
    .section-card h3 { font-size: 9px !important; margin-bottom: 5px !important; }
    .info-grid { grid-template-columns: 1fr 1fr; gap: 4px !important; margin-top: 5px !important; }
    .info-item label { font-size: 8px !important; margin-bottom: 1px !important; color: #888; }
    .info-item input { padding: 2px 5px !important; height: 22px !important; font-size: 9px !important; border-radius: 3px; }
    .scroll-box { overflow-x: hidden; }
    .course-table { width: 100% !important; min-width: 100% !important; table-layout: fixed !important; font-size: 9px !important; border-collapse: collapse !important; }
    .course-table tr { height: 1px !important; }
    .course-table th:nth-child(1), .course-table td:nth-child(1) { width: 30% !important; }
    .course-table th:nth-child(2), .course-table td:nth-child(2) { width: 55% !important; }
    .course-table th:nth-child(5), .course-table td:nth-child(5) { width: 15% !important; display: table-cell !important; }
    .course-table th:nth-child(3), .course-table td:nth-child(3), .course-table th:nth-child(4), .course-table td:nth-child(4) { display: none !important; visibility: collapse !important; width: 0 !important; }
    .course-table th, .course-table td { padding: 4px 2px !important; height: 1px !important; overflow: hidden; text-overflow: ellipsis; white-space: normal !important; }
    .sub-item-container, .sub-item-row { display: none !important; height: 0 !important; }
    .subject-cell div { font-size: 9px !important; line-height: 1.1 !important; margin: 1px 0 !important; padding: 0 !important; }
    .course-table td div { display: inline-block !important; font-size: 9px !important; margin-right: 5px !important; vertical-align: middle; }
    .summary-row td:nth-child(3), .summary-row td:nth-child(4) { display: none !important; }
    .summary-row td { position: relative; top: 0; font-size: 9px !important; height: auto !important; }
    .subject-card .std-table th:nth-child(n+2), .subject-card .std-table td:nth-child(n+2) { display: none !important; }
    .subject-card .std-table th:nth-child(1), .subject-card .std-table td:nth-child(1) { width: 100% !important; font-size: 13px !important; }
    /* 📍 [추가 1] 모바일 화면에서 개요 저장 버튼 정밀 축소 */
    .section-card .btn-green[onclick="saveOverviewOnly()"] { padding: 2px 8px !important; font-size: 9px !important; min-height: 22px !important; width: auto !important; margin-bottom: 0 !important;}
   /* 📍 [추가 2] 개요 제목과 버튼 사이 간격 조정 */
    .section-card div[style*="justify-content: space-between"] { margin-bottom: 5px !important; }
    #uploadGuide { display: none !important; } /* 📍 가이드 표 숨김 처리 */

}
    </style>
</head>
<body>

<div class="container">
    <div class="class-info-bar">
        <a href="select_class.html" class="btn-home">◀ 반 선택 이동</a>
        <div style="margin-left: auto;">
            <span>현재 학급: </span>
            <span id="currentClassDisplay" class="current-badge">로딩 중...</span>
        </div>
    </div>

    <div class="header">
        <h1>🚗 부산 자동차 교육과정 통합 시스템</h1>
        <div id="connectionStatus">⏳ 연결 확인 중...</div>
    </div>

    <div class="top-action-grid">
        <div class="section-card" style="border-top: 4px solid #3498db;">
            <h4 style="margin-top:0;">📅 시간표 등록 및 관리</h4>

<div id="uploadGuide" style="margin-bottom: 10px; overflow-x: auto; font-family: 'Malgun Gothic', '맑은 고딕', sans-serif;">
    <p style="font-size: 8px; color: #666; margin: 0 0 5px 2px;">※ 엑셀 헤더 규격 (드래그하여 엑셀 양식으로 사용 가능)</p>
    <table id="excelGuideTable" style="width: 100%; border-collapse: collapse; font-size: 8px; table-layout: fixed; border: 1px solid #dee2e6;">
        <tr style="background: #f8f9fa; height: 20px;">
            <td style="border: 1px solid #dee2e6; text-align: center; font-weight: bold;">일수</td>
            <td style="border: 1px solid #dee2e6; text-align: center; font-weight: bold;">날짜</td>
            <td style="border: 1px solid #dee2e6; text-align: center; font-weight: bold;">요일</td>
            <td style="border: 1px solid #dee2e6; text-align: center; font-weight: bold;">교시</td>
            <td style="border: 1px solid #dee2e6; text-align: center; font-weight: bold;">훈련시간</td>
            <td style="border: 1px solid #dee2e6; text-align: center; font-weight: bold;">교과목</td>
            <td style="border: 1px solid #dee2e6; text-align: center; font-weight: bold;">능력단위명</td>
            <td style="border: 1px solid #dee2e6; text-align: center; font-weight: bold;">세부교과</td>
            <td style="border: 1px solid #dee2e6; text-align: center; font-weight: bold;">훈련교사</td>
            <td style="border: 1px solid #dee2e6; text-align: center; font-weight: bold;">훈련장소</td>
        </tr>
    </table>
</div>
            <div style="display: flex; flex-direction: column; gap: 10px;">
                <div class="file-upload-wrapper">
                    <label for="timetableFile" class="file-upload-label">📁 시간표 등록 (Excel)</label>
                    <input type="file" id="timetableFile" accept=".xlsx, .xls" 
       onclick="return confirmBeforeOpen(event)" 
       onchange="processTimetable(this)">
                </div>
                
                <div id="fileStatusBox" style="display: none;">
                    <div class="upload-action-bar">
                        <span style="font-size: 12px; color: #2c3e50; font-weight: bold;">📄 파일: <span id="savedFileName">-</span></span>
                        <button class="btn btn-green" style="padding: 5px 10px; font-size: 11px;" onclick="confirmTimetableSave()">💾 서버 확정 저장</button>
                        <button class="btn btn-red" style="padding: 5px 10px; font-size: 11px;" onclick="deleteTimetable()">❌ 전체 삭제</button>
                    </div>
                </div>
                <button id="downloadBtn" class="btn btn-blue" style="display:none; width: 100%;" onclick="downloadSavedTimetable()">📥 등록된 시간표 다운</button>
            </div>
        </div>
        <div class="section-card" style="border-top: 4px solid #27ae60;">
            <h4 style="margin-top:0;">📝 출결 관리 및 분석</h4>
            <div style="display: flex; flex-direction: column; gap: 10px;">
                  <button class="btn btn-orange" onclick="location.href='일일출석부.html?class=' + currentClass">📅 일일출석부 등록</button>
                  <button class="btn btn-green" onclick="location.href='능력단위시간표.html?class=' + currentClass">📊 능력단위별 분석기</button>
                  <button class="btn btn-purple" onclick="location.href='단위개월출석부.html?class=' + currentClass">📈 단위개월 출석률 보기</button>
                  <button class="btn btn-blue" style="background: #2c3e50;" onclick="location.href='평가계획서.html?class=' + currentClass">📄 평가계획서 출력 및 관리</button>
                  <button class="btn btn-blue" style="background: #16a085;" onclick="location.href='../평가지/평가지.html?class=' + currentClass">📋 내부평가지 관리</button>
            </div>
        </div>
    </div>


    <div class="section-card">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <h3 style="margin:0;">📋 훈련 과정 개요</h3>
            <button class="btn btn-green" style="padding: 5px 15px;" onclick="saveOverviewOnly()">💾 개요 정보만 저장</button>
        </div>
        <div class="info-grid">
            <div class="info-item"><label>훈련명</label><input type="text" id="trainingName"></div>
            <div class="info-item"><label>훈련기간</label><input type="text" id="trainingPeriod"></div>
            <div class="info-item"><label>총 일수</label><input type="text" id="totalDays" readonly style="background:#f8f9fa;"></div>
            <div class="info-item"><label>담당교사</label><input type="text" id="teacherName" style="background:#fff;"></div>
        </div>
    </div>

    <div class="section-card">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
            <h3>📂 교과목 상세 현황</h3>
            <div style="display: flex; gap: 8px;">
            </div>
        </div>
        <div class="scroll-box">
            <table class="course-table">
                <thead>
                    <tr><th width="15%">교과목</th><th width="20%">능력단위명</th><th width="35%">세부교과</th><th width="10%">시간(h)</th><th width="10%">총 시간</th></tr>
                </thead>
                <tbody id="courseTableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script src="index1.js"></script>
</body>
</html>
