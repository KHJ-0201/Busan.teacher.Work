-table{width:100%;border-collapse:separate;border-spacing:0;font-size:12px;table-layout:fixed;border-left:1px solid #dee2e6;border-top:1px solid #dee2e6;background-color:#fff}.course-table th{background:#f8f9fa;position:sticky;top:0;z-index:30;padding:14px 10px;border-bottom:1px solid #dee2e6;border-right:1px solid #dee2e6;font-weight:800}.summary-row td{background-color:#2c3e50!important;color:#fff!important;font-weight:700;position:sticky;top:45px;z-index:25;border-bottom:3px solid #3498db;border-right:1px solid #dee2e6;padding:10px}.course-table td{border-bottom:1px solid #a2d2ff;border-right:1px solid #a2d2ff;text-align:center;vertical-align:middle;background:#fff;line-height:1.4;padding:0}.subject-cell{background-color:#f0f7ff;font-weight:700;color:#2c3e50;border-right:3px solid #3498db!important;border-left:3px solid #3498db!important;border-bottom:1px solid #dee2e6;padding:5px!important}.subject-total-cell{background-color:#fff9f0;font-weight:700;color:#e67e22;border-left:3px solid #e67e22!important;padding:5px!important}.top-border-thick{border-top:3px solid #3498db!important}.sub-item-container{display:flex;flex-direction:column;width:100%;height:100%}.top-border-thick td{border-top:3px solid #3498db!important}.sub-item-row{display:flex;align-items:center;justify-content:center;border-bottom:1px solid #eee;min-height:35px;box-sizing:border-box}.sub-item-row:last-child{border-bottom:none}.editable-input{width:100%;height:100%;border:none;text-align:center;font-size:12px;font-family:inherit;transition:background .3s}.editable-input:focus{background:#fffde7;outline:0}.text-left{text-align:left;padding-left:10px}.btn{padding:9px 18px;border-radius:6px;border:none;cursor:pointer;font-weight:700;font-size:12px;transition:.2s}.btn-blue{background:#3498db;color:#fff}.btn-green{background:#27ae60;color:#fff}.btn-orange{background:#e67e22;color:#fff}.btn-red{background:#e74c3c;color:#fff}.upload-action-bar{display:flex;align-items:center;gap:10px;background:#fffef0;padding:10px;border:1px dashed #e67e22;border-radius:8px;margin-top:5px}.file-upload-wrapper{position:relative;display:inline-block;width:100%}.file-upload-label{display:block;background:#3498db;color:#fff;padding:12px;text-align:center;border-radius:8px;font-weight:700;cursor:pointer;transition:.3s;border:2px solid #2980b9}.file-upload-label:hover{background:#2980b9;box-shadow:0 4px 10px rgba(0,0,0,.15)}#timetableFile{position:absolute;left:0;top:0;opacity:0;width:100%;height:100%;cursor:pointer}#connectionStatus{font-size:12px;font-weight:700;padding:5px 10px;border-radius:5px}.status-online{color:#27ae60;background:#e8f5e9}.status-offline{color:#e74c3c;background:#fdeaea}.btn-purple{background:#8e44ad;color:#fff}.panel-item{min-height:42px;box-sizing:border-box;margin-top:0!important}.panel-btn{display:flex;align-items:center;justify-content:center;width:100%}@media (max-width:768px){body{padding:10px}.container{margin:10px auto;padding:15px;min-height:auto;width:95%}.header{margin-bottom:5px;border-bottom:2px solid #3498db}.header h1{font-size:13px;margin:3px 0;text-align:center}#connectionStatus{position:absolute;top:12px;right:10px;font-size:8px;padding:1px 4px}.class-info-bar{position:relative;flex-direction:row;justify-content:flex-start;gap:8px;padding:5px;margin-bottom:5px}.class-info-bar div{font-size:10px;white-space:nowrap}.top-action-grid{grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}.section-card{padding:8px!important;margin-bottom:0!important;min-height:auto!important}.section-card h4{font-size:10px!important;margin-top:0!important;margin-bottom:4px!important;color:#555}.section-card .btn{padding:4px 2px!important;font-size:9px!important;min-height:28px!important;line-height:1.2;margin-bottom:2px!important;width:100%}.file-upload-label{padding:4px 2px!important;font-size:10px!important;min-height:28px!important;display:flex;align-items:center;justify-content:center;margin-bottom:3px!important}#downloadBtn{display:none!important}#fileStatusBox{display:block!important}.upload-action-bar{padding:3px!important;gap:1px!important;flex-direction:column;border:1px dashed #ccc}.upload-action-bar span{font-size:9px!important}.upload-action-bar .btn{padding:2px!important;min-height:20px!important;font-size:8px!important;margin-bottom:1px!important}.section-card div[style*="flex-direction: column"]{gap:2px!important}.section-card h3{font-size:9px!important;margin-bottom:5px!important}.info-grid{grid-template-columns:1fr 1fr;gap:4px!important;margin-top:5px!important}.info-item label{font-size:8px!important;margin-bottom:1px!important;color:#888}.info-item input{padding:2px 5px!important;height:22px!important;font-size:9px!important;border-radius:3px}.scroll-box{overflow-x:hidden}.course-table{width:100%!important;min-width:100%!important;table-layout:fixed!important;font-size:9px!important;border-collapse:collapse!important}.course-table tr{height:1px!important}.course-table td:nth-child(1),.course-table th:nth-child(1){width:30%!important}.course-table td:nth-child(2),.course-table th:nth-child(2){width:55%!important}.course-table td:nth-child(6),.course-table th:nth-child(6){width:15%!important;display:table-cell!important}.course-table td:nth-child(3),.course-table td:nth-child(4),.course-table td:nth-child(5),.course-table th:nth-child(3),.course-table th:nth-child(4),.course-table th:nth-child(5){display:none!important;visibility:collapse!important;width:0!important}.course-table td,.course-table th{padding:4px 2px!important;height:1px!important;overflow:hidden;text-overflow:ellipsis;white-space:normal!important}.sub-item-container,.sub-item-row{display:none!important;height:0!important}.subject-cell div{font-size:9px!important;line-height:1.1!important;margin:1px 0!important;padding:0!important}.course-table td div{display:inline-block!important;font-size:9px!important;margin-right:5px!important;vertical-align:middle}.summary-row td:nth-child(3),.summary-row td:nth-child(4),.summary-row td:nth-child(5){display:none!important}.summary-row td{position:relative;top:0;font-size:9px!important;height:auto!important}.subject-card .std-table td:nth-child(n+2),.subject-card .std-table th:nth-child(n+2){display:none!important}.subject-card .std-table td:nth-child(1),.subject-card .std-table th:nth-child(1){width:100%!important;font-size:13px!important}.section-card .btn-green[onclick="saveOverviewOnly()"]{padding:2px 8px!important;font-size:9px!important;min-height:22px!important;width:auto!important;margin-bottom:0!important}.section-card div[style*="justify-content: space-between"]{margin-bottom:5px!important}#guideText,#uploadGuide{display:none!important}}</style></head><body><div class="container"><div class="class-info-bar"><a href="select_class.html" class="btn-home">◀ 반 선택 이동</a><div style="margin-left:auto"><span>현재 학급: </span><span id="currentClassDisplay" class="current-badge">로딩 중...</span></div></div><div class="header" style="position:relative"><h1>🚗 부산자동차직교 통합 시스템</h1><div id="headerRightGroup" style="display:flex;align-items:center;gap:10px"><button id="btnNavStudentViewer" class="btn" style="background:#1abc9c;color:#fff;border:1px solid #16a085;font-size:12px;padding:4px 10px;border-radius:6px;box-shadow:0 2px 4px rgba(0,0,0,.1)">🔗 학생들 평가일정 배포용</button><div id="connectionStatus">⏳ 연결 확인 중...</div></div></div><div class="top-action-grid"><div class="section-card" style="border-top:4px solid #3498db"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;gap:15px"><h4 style="margin:0;white-space:nowrap">📅 시간표 및 RD 등록</h4><div id="uploadGuide" style="flex-grow:1;max-width:650px;overflow-x:auto;font-family:'Malgun Gothic','맑은 고딕',sans-serif"><table id="excelGuideTable" style="width:100%;border-collapse:collapse;font-size:8px;table-layout:fixed;border:1px solid #dee2e6"><tr style="background:#f8f9fa;height:20px"><td style="border:1px solid #dee2e6;text-align:center;font-weight:700">일수</td><td style="border:1px solid #dee2e6;text-align:center;font-weight:700">날짜</td><td style="border:1px solid #dee2e6;text-align:center;font-weight:700">요일</td><td style="border:1px solid #dee2e6;text-align:center;font-weight:700">교시</td><td style="border:1px solid #dee2e6;text-align:center;font-weight:700">훈련시간</td><td style="border:1px solid #dee2e6;text-align:center;font-weight:700">교과목</td><td style="border:1px solid #dee2e6;text-align:center;font-weight:700">능력단위명</td><td style="border:1px solid #dee2e6;text-align:center;font-weight:700">세부교과</td><td style="border:1px solid #dee2e6;text-align:center;font-weight:700">훈련교사</td><td style="border:1px solid #dee2e6;text-align:center;font-weight:700">훈련장소</td></tr></table></div></div><div style="display:flex;flex-direction:column;gap:10px"><div class="file-upload-wrapper"><label for="timetableFile" class="file-upload-label panel-item panel-btn">📁 시간표 등록 (Excel)</label> <input type="file" id="timetableFile" accept=".xlsx, .xls"></div><div class="file-upload-wrapper"><label for="rdExcelFile" class="file-upload-label panel-item panel-btn" style="background:#8e44ad;border-color:#732d91">📊 훈련기준 등록 (RD Excel)</label> <input type="file" id="rdExcelFile" accept=".xlsx, .xls, .csv" style="position:absolute;left:0;top:0;opacity:0;width:100%;height:100%;cursor:pointer"></div><div id="rdStatusBox" class="panel-item" style="display:none;padding:6px 8px;background:#f5eef8;border:1px dashed #8e44ad;border-radius:8px;font-size:11px;color:#6c3483;font-weight:700;text-align:center">✅ 훈련기준(RD) 업로드 완료<br><span id="rdFileName" style="color:#e67e22;font-size:10px"></span></div><div id="fileStatusBox" style="display:none"><div class="upload-action-bar panel-item"><span style="font-size:12px;color:#2c3e50;font-weight:700">📄 파일: <span id="savedFileName">-</span></span> <button id="btnConfirmTimetableSave" class="btn btn-green" style="padding:5px 10px;font-size:11px">💾 서버 확정 저장</button> <button id="btnDeleteTimetable" class="btn btn-red" style="padding:5px 10px;font-size:11px">❌ 전체 삭제</button></div></div><button id="downloadBtn" class="btn btn-blue panel-item panel-btn" style="display:none;width:100%">📥 등록된 시간표 다운</button></div></div><div class="section-card" style="border-top:4px solid #27ae60"><h4 style="margin-top:0">📝 출결 관리 및 분석</h4><div style="display:flex;flex-direction:column;gap:10px"><button id="btnNavDaily" class="btn btn-orange panel-item panel-btn">📅 일일출석부 등록(매일 엑셀시간표 등록)</button> <button id="btnNavUnit" class="btn btn-green panel-item panel-btn">📊 능력단위별출석부+평가일정+주차별출석+보강수업</button> <button id="btnNavMonth" class="btn btn-purple panel-item panel-btn">📈 단위개월 출석부</button> <button id="btnNavEvalPlan" class="btn btn-blue panel-item panel-btn" style="background:#2c3e50">📄 사전평가계획서+평가계획서+필수/선택수정 엑셀다운</button> <button id="btnNavEval" class="btn btn-blue panel-item panel-btn" style="background:#16a085">📋 내부평가지+최종결과표+개인내부평가표</button> <button id="btnNavConsult" class="btn btn-blue panel-item panel-btn" style="background:#d35400">🤝 학생별 상담일지</button></div></div></div><div class="section-card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><h3 style="margin:0">📋 훈련 과정 개요</h3><button id="btnSaveOverview" class="btn btn-green" style="padding:5px 15px">💾 개요 정보만 저장</button></div><div class="info-grid"><div class="info-item"><label>훈련명</label><input type="text" id="trainingName"></div><div class="info-item"><label>훈련기간</label><input type="text" id="trainingPeriod"></div><div class="info-item"><label>총 일수</label><input type="text" id="totalDays" readonly="readonly" style="background:#f8f9fa"></div><div class="info-item"><label>담당교사</label><input type="text" id="teacherName" style="background:#fff"></div></div></div><div class="section-card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><h3>📂 교과목 상세 현황</h3><div style="display:flex;gap:8px"></div></div><div class="scroll-box"><table class="course-table"><thead><tr><th width="15%">교과목</th><th width="20%">능력단위명</th>
