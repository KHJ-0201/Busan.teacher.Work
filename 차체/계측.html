        html, body { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #ecf0f1; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        
        .master-grid {
            display: grid;
            grid-template-columns: repeat(50, 1fr);
            grid-template-rows: repeat(40, 1fr);
            position: relative;
            aspect-ratio: 60 / 40; 
            height: 100vh;
            visibility: hidden; 
        }

        .master-grid::before {
            content: ""; position: absolute;
            grid-column: 11 / 41; grid-row: 4 / 34;
            background-image: url('계측.webp'); background-size: 100% 100%; background-repeat: no-repeat;
            z-index: 0; pointer-events: none; width: 100%; height: 100%;

        .cell { border: none !important; display: flex; justify-content: center; align-items: center; background-color: transparent; }
        .margin-space { background-color: #ecf0f1; z-index: 2; }

        /* [2] 1페이지 측정 박스 */
        .measure-box {
            position: absolute; width: 20px; height: 20px;
            background-color: white; border: 2px solid black; transform: translate(-50%, -50%);

        }

        /* [3] 1페이지 상/하단 디스플레이 */

        .top-col-day { grid-column: 5 / 6; font-size: 1.2rem; font-weight: bold; color: #1e90ff; border: 2px solid #1e90ff; border-radius: 4px; padding: 2px; background-color: white; margin-left: auto; width: 60%; }

        .action-btn { width: 45px; height: 26px; font-size: 0.8rem; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-save { background-color: #2ed573; color: #2f3542; }
        .btn-edit { background-color: #ff4757; }

                  =======================================================
                  1. width (가로 폭): 아래 '130%' 숫자를 늘리면 프린트 내용이 좌우로 커지고, 줄이면 작아집니다.
                  2. height (세로 폭): 반드시 'auto' 로 두셔야 합니다.
                  3. aspect-ratio (비율 핀): 도면 배경 이미지와 네모 좌표들이 이탈하지 않게 묶어줍니다. 절대 건드리지 마세요!
                */
                width: 160% !important;   
                height: 101% !important;  
                aspect-ratio: 40 / 40 !important; 
                
                position: relative !important;
                left: 50% !important;
                transform: translateX(-50%) !important; 
                visibility: visible !important; display: grid !important;
            }

   ======================================================= */
.mobile-top-bar { display: none; } /* 기본 상태(PC)에서는 숨김 */

/* =======================================================
   [모바일 전용: 전체 화면 통째로 축소 모드]
   ======================================================= */
@media screen and (max-width: 768px) {
    /* 1. HTML 및 BODY 스크롤 물리적 차단 */
    html, body {
        margin: 0; padding: 0;
        width: 100vw; height: 100vh;
        /* 가로/세로 스크롤바 생성 및 작동 금지 */
        overflow: hidden !important; 
        /* 모바일 터치로 인한 화면 밀림(바운스) 방지 */
        overscroll-behavior: none;
        /* 바디 자체를 화면에 고정 */
        position: fixed; 
    }

    /* 2. 기존 사이드 패널 숨김 */
    .left-control-panel, .right-control-panel { display: none !important; }

    /* [선생님 전용 컨트롤러] : 수치 100% 보존 */
    :root {
        --m-scale: 0.65;      
        --m-width: 100vw;     
        --m-height: 100vh;    
        --m-top-bar: 50px;    
    }

    /* 3. 모바일 최상단 1줄 관제바 : 위치 고정 */
    .mobile-top-bar {
        display: flex !important;
        position: fixed !important;
        top: 0 !important;
        left: 0 !important;
        width: 100% !important;
        height: var(--m-top-bar);
        background-color: #2f3542;
        z-index: 10001;
        align-items: center; padding: 0 10px; gap: 5px;
        box-sizing: border-box;
        /* 상단바 영역 내에서도 스크롤 금지 */
        overflow: hidden !important;
    }

    /* 4. PC 화면 통째로 축소 엔진 (master-grid) : 선생님 수치 100% 보존 */
    .master-grid {
        display: grid !important; 
        visibility: visible !important;
        position: absolute !important; 
        
        top: var(--m-top-bar) !important;
        left: 50%;
        
        /* 선생님이 직접 맞추신 커스텀 수치 유지 */
        width: 130vh !important; 
        height: 127vh !important; 

        transform: translateX(-50%) scale(var(--m-scale)) !important;
        transform-origin: top center;
        
        margin: 0 !important;
        z-index: 1;
        
        /* 그리드 내부 내용이 넘쳐도 스크롤 생성 금지 */
        overflow: hidden !important;
    }
}

    // [서버로 전송 엔진]
    function saveAllData() {
    const inputs = document.querySelectorAll('.wheel-card input[type="number"]');
    
    // 1. 요일별 기준값 저장 공간이 비어있는지 먼저 점검 (안전 장치)
    if (!standardData[currentDay]) {
        standardData[currentDay] = {};
    }

    inputs.forEach(el => {
        const idParts = el.id.split('-'); // 예: ["FL", "width", "m"]
        if (idParts.length < 3) return;   // 비정상적인 ID 스킵

        const key = idParts[0] + '-' + idParts[1]; // 예: "FL-width" 또는 "F-width"
        const type = idParts[2];                  // "m" (측정치) 또는 "s" (기준치)

        if (type === 'm') { 
            measureData[key] = el.value; 
        } else if (type === 's') { 
            standardData[currentDay][key] = el.value; 
        }
    });
    
    // 현재 시간을 굽기 (기존 로직 유지)
    const now = new Date();
    const timeStr = now.getFullYear() + '.' + (now.getMonth() + 1) + '.' + now.getDate() + ' ' + now.getHours() + ':' + String(now.getMinutes()).padStart(2, '0');
    
    // 파이어베이스 DB로 일괄 전송
    database.ref('carBodyMeasurement').set({
        measureData: measureData,
        standardData: standardData,
        lockState: 'locked',
        lastModified: timeStr
    }).then(() => {
        document.getElementById('last-modified-time').innerText = timeStr;
        if(document.getElementById('m-time-val')) document.getElementById('m-time-val').innerText = timeStr.split(' ')[1]; // 시간만 표시
        isSystemLocked = true; 
        applyLockState(true);
        calculateArrows(); 
        alert("✅ 클라우드 저장소에 안전하게 기록되었습니다. 시스템을 잠급니다.");
    }).catch(err => {
        console.error("저장 오류 상세:", err);
        alert("❌ 저장 실패: " + err.message);
    });
}

    function updateBoxDisplay(boxId, m, s, rule) {
        const boxEl = document.getElementById('box-' + boxId);
        if (!boxEl) return;
        
        if (m === '' || s === '') {
            boxEl.innerHTML = boxId;
            boxEl.style.color = 'black'; 
            return;
        }
        
        const measure = parseFloat(m);
        const standard = parseFloat(s);
        const formatRed = (char) => `<span style="color: #ff4757; font-weight: 900; font-size: 15px;">${char}</span>`;
        
        const redCircle = `<div style="box-sizing: border-box; width: 13px; height: 13px; border: 3px solid #ff4757; border-radius: 50%;"></div>`;
        
        if (measure === standard) {
            boxEl.innerHTML = redCircle; 
            return;
        }
        
        let arrow = '';
        if (rule === 'FL-width' || rule === 'RL-width') {
            arrow = measure > standard ? '←' : '→';
        } else if (rule === 'FR-width' || rule === 'RR-width') {
            arrow = measure < standard ? '←' : '→';
        } else if (rule === 'FL-length' || rule === 'FR-length') {
            arrow = measure > standard ? '↑' : '↓';
        } else if (rule === 'RL-length' || rule === 'RR-length') {
            arrow = measure > standard ? '↓' : '↑';
        } else if (rule === 'height') { 
            arrow = measure > standard ? '→' : '←';
        }
        
        boxEl.innerHTML = formatRed(arrow);
    }

    function updatePage2Values() {

        const setP2Box = (id, val) => {
            const el = document.getElementById('p2-box-' + id);

        };

        const setP2BoxRotated = (id, val) => {
            const el = document.getElementById('p2-box-' + id);

        };

        setP2Box(1, f_w); setP2Box(2, f_w);
        setP2Box(3, r_w); setP2Box(4, r_w);
        setP2BoxRotated(7, f_l); setP2BoxRotated(8, r_l);
        setP2Box(5, f_h); setP2Box(6, r_h);

        const box9 = document.getElementById('p2-box-9');
        if(box9) {
            box9.style.border = 'none';
            box9.style.backgroundColor = 'transparent';

        }
    }

    function calculateArrows() {
        const getValue = (id) => document.getElementById(id) ? document.getElementById(id).value : '';

        const F_w_s = getValue('F-width-s'), F_l_s = getValue('F-length-s'), F_h_s = getValue('F-height-s');
        const R_w_s = getValue('R-width-s'), R_l_s = getValue('R-length-s'), R_h_s = getValue('R-height-s');

        const FL_w_m = getValue('FL-width-m'), FR_w_m = getValue('FR-width-m');
        const FL_l_m = getValue('FL-length-m'), FR_l_m = getValue('FR-length-m');
        const FL_h_m = getValue('FL-height-m'), FR_h_m = getValue('FR-height-m');

        const RL_w_m = getValue('RL-width-m'), RR_w_m = getValue('RR-width-m');
        const RL_l_m = getValue('RL-length-m'), RR_l_m = getValue('RR-length-m');
        const RL_h_m = getValue('RL-height-m'), RR_h_m = getValue('RR-height-m');

        [1,2,3].forEach(id => updateBoxDisplay(id, FL_w_m, F_w_s, 'FL-width'));
        [4,5,6].forEach(id => updateBoxDisplay(id, FR_w_m, F_w_s, 'FR-width'));
        [7,8,9].forEach(id => updateBoxDisplay(id, FL_l_m, F_l_s, 'FL-length'));
        [10,11,12].forEach(id => updateBoxDisplay(id, FR_l_m, F_l_s, 'FR-length'));
        [13,14,15].forEach(id => updateBoxDisplay(id, FL_h_m, F_h_s, 'height'));
        [16,17,18].forEach(id => updateBoxDisplay(id, FR_h_m, F_h_s, 'height'));

        [19,20].forEach(id => updateBoxDisplay(id, RL_w_m, R_w_s, 'RL-width'));
        [21,22].forEach(id => updateBoxDisplay(id, RR_w_m, R_w_s, 'RR-width'));
        [23,24].forEach(id => updateBoxDisplay(id, RL_l_m, R_l_s, 'RL-length'));
        [25,26].forEach(id => updateBoxDisplay(id, RR_l_m, R_l_s, 'RR-length'));
        [27,28].forEach(id => updateBoxDisplay(id, RL_h_m, R_h_s, 'height'));
        [29,30].forEach(id => updateBoxDisplay(id, RR_h_m, R_h_s, 'height'));

        const blackCircle = `<div style="box-sizing: border-box; width: 13px; height: 13px; border: 3px solid black; border-radius: 50%;"></div>`;
        for (let i = 31; i <= 60; i++) {
            const boxEl = document.getElementById('box-' + i);
            if (boxEl) boxEl.innerHTML = blackCircle;
        }

        updatePage2Values();
    }

    // [수정 후] 데이터 로드 즉시 물리적 잠금 공정 강제 집행
function loadFirebaseData() {
    // 시작하자마자 일단 잠금 유지
    isSystemLocked = true; 
    
    database.ref('carBodyMeasurement').once('value', (snap) => {
        const data = snap.val();
        if (data) {
            measureData = data.measureData || {};
            standardData = data.standardData || { '일':{}, '월':{}, '화':{}, '수':{}, '목':{}, '금':{}, '토':{} };
            // 서버에 저장된 값이 'locked'일 때만 true, 아니면 false
            isSystemLocked = (data.lockState === 'locked'); 
            document.getElementById('last-modified-time').innerText = data.lastModified || '기록 없음';
        }
        
        currentDay = '월';
        document.querySelectorAll('.day-btn').forEach(b => b.classList.toggle('active', b.innerText === '월'));
        document.getElementById('topDayDisplay').innerText = '월요일'; 
        
        renderCards(); 
        
        // [정밀 수리] 데이터를 다 불러온 즉시, 판독된 잠금 상태를 물리적으로 적용합니다.
        applyLockState(isSystemLocked); 
        
    }).catch(err => {
        console.error("DB 연동 실패:", err);
        alert("데이터를 불러오지 못했습니다.");
    });
}

    function smartPrint() {
    // 1. 현재 페이지 판별 및 요일 정보 (순정 요일만 추출)
    const isPage2 = (p2Panel.style.display === 'block');
    const dayInfo = currentDay + "요일"; // 예: "화요일"
    
    // 2. 현재 날짜 정보 추출 (YYYY-MM-DD 형식)
    const now = new Date();
    const year = now.getFullYear();
    const month = String(now.getMonth() + 1).padStart(2, '0');
    const date = String(now.getDate()).padStart(2, '0');
    const dateStr = `${year}-${month}-${date}`; 
    
    // 3. 파일명 조립 (선생님 요청 순서: 명칭(요일)_수정일 날짜)
    let fileName = "";
    if (!isPage2) {
        // 예: 계측답안(화요일)_수정일 2026-03-15
        fileName = `계측답안(${dayInfo})_수정일 ${dateStr}`;
    } else {
        // 예: 계측 기준값(화요일)_수정일 2026-03-15
        fileName = `계측 기준값(${dayInfo})_수정일 ${dateStr}`;
    }

    // 4. 브라우저 타이틀 임시 변경 및 출력 실행
    const originalTitle = document.title;
    document.title = fileName;

    window.print();

    // 5. 출력 완료 후 타이틀 복구
    setTimeout(() => {
        document.title = originalTitle;
    }, 1000);
}
